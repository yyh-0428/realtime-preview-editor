        startLeftPanelPct = parseFloat(snippetsPanel.style.width) || PANEL_DEFAULT_PCT;
        startLeftCoord = cx;
        document.addEventListener('mousemove', onLeftMouseMove); document.addEventListener('mouseup', onLeftDragEnd);
        document.addEventListener('touchmove', onLeftTouchMove, { passive: false }); document.addEventListener('touchend', onLeftDragEnd);
        document.body.style.userSelect = 'none';
    }
    function onLeftMouseMove(e) { if (!isDraggingLeft) return; e.preventDefault(); updateLeftRatio(e.clientX); }
    function onLeftTouchMove(e) { if (!isDraggingLeft) return; e.preventDefault(); const t = e.touches[0]; if (t) updateLeftRatio(t.clientX); }
    function updateLeftRatio(coord) {
        const wr = workspace.getBoundingClientRect(); const wp = wr.width;
        if (wp === 0) return;
        const dp = coord - startLeftCoord; const dc = (dp / wp) * 100;
        let np = startLeftPanelPct + dc;
        np = Math.max(PANEL_MIN_PCT, Math.min(PANEL_MAX_PCT, np));
        applyPanelWidth(np);
    }
    function onLeftDragEnd() {
        if (!isDraggingLeft) return; isDraggingLeft = false;
        resizerLeft.classList.remove('dragging'); dragOverlay.classList.remove('active'); dragOverlay.style.cursor = '';
        document.removeEventListener('mousemove', onLeftMouseMove); document.removeEventListener('mouseup', onLeftDragEnd);
        document.removeEventListener('touchmove', onLeftTouchMove); document.removeEventListener('touchend', onLeftDragEnd);
        document.body.style.userSelect = ''; savePanelWidth(); editor.refresh();
    }
    function initLeftResizer() {
        resizerLeft.addEventListener('mousedown', (e) => { e.preventDefault(); startLeftDrag(e.clientX); });
        resizerLeft.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; if (t) startLeftDrag(t.clientX); }, { passive: false });
    }

一、核心动画（Core + CSSPlugin）
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
缓动函数优先级：
- 通用入场: "power2.out" / "power3.out"（平滑减速）
- 弹性: "back.out(1.7)"（轻微回弹）
- 强调: "expo.out"（快速启动缓慢结束）
- 禁止 UI 动画使用无意义的 "linear"
- 额外缓动（EasePack）: "slow(0.7,0.7,false)" / "rough({strength:1,points:20})"

时间线编排：
- gsap.timeline({defaults:{duration:0.8,ease:'power3.out'}}).from('.a',{y:40,opacity:0}).from('.b',{y:30,opacity:0},'-=0.4')
- 交错: gsap.from('.card',{y:50,opacity:0,stagger:0.1,duration:0.6})
- 控制: tl.pause(); tl.play(); tl.reverse(); tl.seek(2)

实用模式：
- 淡入上移: gsap.from(el,{y:30,opacity:0,duration:0.6,ease:'power2.out'})
- 缩放弹出: gsap.from(el,{scale:0.9,opacity:0,duration:0.5,ease:'back.out(1.7)'})
- 无限循环: gsap.to(el,{rotation:360,duration:2,repeat:-1,ease:'none'})
- 弹性摇摆: gsap.to(el,{rotation:10,duration:0.3,yoyo:true,repeat:5,ease:'power1.inOut'})

性能原则：
- 只动画 transform / opacity（GPU 加速）
- 禁止动画 width/height/top/left（引发重排）
- will-change: transform 给即将动画的元素
- duration: UI 微交互 0.2s-0.4s，页面入场 0.5s-1.2s

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
二、ScrollTrigger — 滚动驱动动画
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
注册: gsap.registerPlugin(ScrollTrigger)

基础用法：
gsap.from('.section',{scrollTrigger:{trigger:'.section',start:'top 80%',toggleActions:'play none none none'},y:60,opacity:0,duration:0.8})

滚动绑定（Scrub）：
gsap.to('.parallax',{scrollTrigger:{trigger:'.wrapper',start:'top bottom',end:'bottom top',scrub:1},y:-100})

固定元素（Pin）：
ScrollTrigger.create({trigger:'.pinned',start:'top top',end:'+=500',pin:true,pinSpacing:true})

批量触发：
gsap.utils.toArray('.reveal').forEach(el=>{gsap.from(el,{scrollTrigger:{trigger:el,start:'top 85%'},y:40,opacity:0,duration:0.7})})

参数说明：
- start/end: 'top 80%' / 'bottom 20%' / 'center center'
- toggleActions: 'play none none none'（进入/离开/再次进入/再次离开）
- scrub: true 或数字（平滑跟随滚动，数字越大越滞后）

    function generateApiFetchCode(api) {
        const needsKey = api.auth === 'apiKey' || api.auth === 'OAuth';
        const isRapid = api.source === 'RapidAPI';
        const keyComment = needsKey ? '\n// 需要替换 YOUR_KEY 为真实密钥' : '';
        const rapidComment = isRapid ? '\n// 在 RapidAPI 注册获取密钥：https://rapidapi.com' : '';
        const method = api.method || 'GET';
        const hasHeaders = api.headers && Object.keys(api.headers).length > 0;
        const hasBody = api.body && api.body.length > 0;

        let options = '';
        if (method !== 'GET' || hasHeaders || hasBody) {
            const opts = [];
            if (method !== 'GET') opts.push("  method: '" + method + "'");
            if (hasHeaders) opts.push('  headers: ' + JSON.stringify(api.headers, null, 2).replace(/\n/g, '\n  '));
            if (hasBody) opts.push("  body: '" + api.body + "'");
            options = ', {\n' + opts.join(',\n') + '\n}';
        }

        return '<script>' + keyComment + rapidComment + '\nfetch("' + api.url + '"' + options + ')\n  .then(res => res.json())\n  .then(data => console.log(data))\n  .catch(err => console.error(err));\n<\/script>';
    }

   - CTA 按钮必须高对比度弹出

4. 空间构图：
   - 有目的的不对称
   - 允许元素重叠（有清晰层级）
   - 慷慨的负空间 或 控制密度（二选一，不要中间态）
   - 打破网格的 hero 区域

5. 动效编排：
   - 一次精心编排的页面加载 > 零散微交互
   - 持续时间 200-400ms（干脆，不拖沓）
   - CSS 优先做简单动画，GSAP 做复杂编排
   - 交错入场（stagger）制造节奏感

6. 背景氛围：
   - 渐变网格（微妙，不刺眼）
   - 噪点/颗粒纹理（SVG filter 或 CSS）
   - 几何图案（点、线、形状）
   - 层次透明度和戏剧性阴影`;

标准 GET：
fetch('URL')
  .then(res => res.json())
  .then(data => console.log(data))
  .catch(err => console.error(err));

带 Headers（如 RapidAPI）：
fetch('URL', {
  method: 'GET',
  headers: { 'X-RapidAPI-Key': 'YOUR_KEY', 'X-RapidAPI-Host': 'HOST' }
})
  .then(res => res.json())
  .then(data => console.log(data));

POST 请求：
fetch('URL', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ key: 'value' })
})
  .then(res => res.json())
  .then(data => console.log(data));

    function autoSelectDesignSystems(instruction) {
        const saved = loadDesignSystem();
        if (saved && saved !== 'default' && saved !== 'auto') return [saved];
        const text = instruction.toLowerCase();
        const scored = [];
        Object.entries(DESIGN_SYSTEMS).forEach(([key, ds]) => {
            if (!ds.keywords || key === 'default') return;
            let score = 0;
            ds.keywords.forEach(kw => {
                if (text.includes(kw.toLowerCase())) score += 1;
            });
            if (score > 0) scored.push({ key, score, ds });
        });
        scored.sort((a, b) => b.score - a.score);
        if (scored.length === 0) return ['default'];
        const top3 = scored.slice(0, 3).map(s => s.key);
        return top3.length > 1 ? top3 : (top3[0] ? [top3[0]] : ['default']);
    }

    function generateCodeHints(code, lang) {
        if (!code || code.length < 10) return '（空文件或代码太短）';
        const lines = code.split('\n');
        const hints = [];
        const seen = new Set();
        const maxHints = 20;

        if (lang === 'html') {
            // 提取 HTML 标签结构
            lines.forEach((line, idx) => {
                const match = line.match(/<([a-zA-Z][a-zA-Z0-9]*)(?:\s|>|\/)/);
                if (match) {
                    const tag = match[1];
                    const key = tag;
                    if (!seen.has(key) && hints.length < maxHints) {
                        seen.add(key);
                        hints.push(`<${tag}> 标签（约第 ${idx + 1} 行附近）`);
                    }
                }
                // 提取 class/id
                const clsMatch = line.match(/class\s*=\s*["']([^"']+)["']/);
                if (clsMatch) {
                    const classes = clsMatch[1].split(/\s+/).filter(c => c && !seen.has('.' + c) && hints.length < maxHints);
                    classes.forEach(c => {
                        seen.add('.' + c);
                        hints.push(`.${c} 类`);
                    });
                }
            });
        } else if (lang === 'css') {
            lines.forEach((line, idx) => {
                const match = line.match(/^\s*([.#][a-zA-Z0-9_-]+\s*(?:,[\s\n]*[.#][a-zA-Z0-9_-]+\s*)*)\{/);
                if (match && hints.length < maxHints) {
                    hints.push(`${match[1].trim()}（第 ${idx + 1} 行）`);
                }
            });
        } else if (lang === 'javascript') {

    // ==================== Incremental Edit Engine ====================
    function parseSearchReplaceBlocks(text) {
        const blocks = [];
        const pattern = /```replace\s*\n?([\s\S]*?)\n?```/g;
        let m;
        while ((m = pattern.exec(text)) !== null) {
            const inner = m[1];
            // Use index-based parsing instead of regex to avoid false matches when SEARCH content contains ">>>"
            const searchIdx = inner.indexOf('<<< SEARCH');
            const replaceIdx = inner.indexOf('>>> REPLACE');
            if (searchIdx !== -1 && replaceIdx !== -1 && replaceIdx > searchIdx) {
                let searchText = inner.substring(searchIdx + '<<< SEARCH'.length, replaceIdx);
                let replaceText = inner.substring(replaceIdx + '>>> REPLACE'.length);
                // Trim exactly one leading/trailing newline if present, but preserve intentional blank lines
                searchText = searchText.replace(/^\n/, '').replace(/\n$/, '');
                replaceText = replaceText.replace(/^\n/, '').replace(/\n$/, '');
                blocks.push({ search: searchText, replace: replaceText });
            }
        }
        return blocks;
    }

    function applySearchReplaceBlocks(blocks) {
        const currentCode = getCode();
        if (blocks.length === 0) return { success: false, reason: 'no_blocks' };

        // Try exact match, then trimmed match, then leading-whitespace-flexible match
        function findUniqueMatch(text, code) {
            // 1. Exact match
            let idx = code.indexOf(text);
            if (idx !== -1) {
                const idx2 = code.indexOf(text, idx + text.length);
                if (idx2 === -1) return { idx, len: text.length };
                return null; // ambiguous exact match
            }
            // 2. Overall trimmed match
            const t = text.trim();
            if (t !== text) {
                idx = code.indexOf(t);
                if (idx !== -1) {
                    const idx2 = code.indexOf(t, idx + t.length);
                    if (idx2 === -1) return { idx, len: t.length };
                    return null;
                }
            }
            // 3. Leading-whitespace-flexible match (ignore indentation differences per line)
            const textLines = text.split('\n');
            const codeLines = code.split('\n');
            const strippedText = textLines.map(l => l.replace(/^\s+/, '')).join('\n');
            for (let i = 0; i <= codeLines.length - textLines.length; i++) {
                const candidate = codeLines.slice(i, i + textLines.length);
                const strippedCandidate = candidate.map(l => l.replace(/^\s+/, '')).join('\n');
                if (strippedCandidate === strippedText) {
                    // Verify uniqueness
                    let count = 0;
                    for (let j = 0; j <= codeLines.length - textLines.length; j++) {
                        const c2 = codeLines.slice(j, j + textLines.length).map(l => l.replace(/^\s+/, '')).join('\n');
                        if (c2 === strippedText) count++;
                    }
                    if (count === 1) {
                        const startIdx = codeLines.slice(0, i).join('\n').length + (i > 0 ? 1 : 0);
                        const actualLen = candidate.join('\n').length;
                        return { idx: startIdx, len: actualLen };
                    }
                    return null; // ambiguous flexible match
                }
            }
            return null;
        }

        const matches = [];
        for (const block of blocks) {
            if (!block.search) continue;
            const found = findUniqueMatch(block.search, currentCode);
            if (!found) {
                return { success: false, reason: 'search_not_found', search: block.search.slice(0, 100) };
            }
            matches.push({
                idx: found.idx,
                searchLen: found.len,
                replace: block.replace,
                from: editor.posFromIndex(found.idx),
                to: editor.posFromIndex(found.idx + found.len)
            });
        }

        // Sort by position descending so later replacements don't affect earlier ones
        matches.sort((a, b) => b.idx - a.idx);

        const changedLines = new Set();
        for (const m of matches) {
            editor.replaceRange(m.replace, m.from, m.to);
            const startLine = m.from.line;
            const endPos = editor.posFromIndex(editor.indexFromPos(m.from) + m.replace.length);
            const endLine = endPos.line;
            for (let l = startLine; l <= endLine; l++) changedLines.add(l);
        }

        return { success: true, changedLines: Array.from(changedLines).sort((a, b) => a - b) };
    }

    // ==================== Line-based Edit Engine ====================
    function parseEditBlocks(text) {
        const blocks = [];
        // Support both ```edit and <edit> markup
        const pattern = /(?:```edit|<edit>)\s*\n?([\s\S]*?)\n?(?:```|<\/edit>)/g;
        let m;
        while ((m = pattern.exec(text)) !== null) {
            const inner = m[1];
            const ops = inner.split(/\n(?=REPLACE|INSERT|DELETE)/);
            for (const op of ops) {
                const trimmed = op.trim();
                if (!trimmed) continue;
                const replaceMatch = trimmed.match(/^REPLACE\s+(\d+)(?:-(\d+))?\s*:\s*\n?([\s\S]*?)\n?END\s*$/);
                if (replaceMatch) {
                    const startLine = parseInt(replaceMatch[1], 10);
                    const endLine = replaceMatch[2] ? parseInt(replaceMatch[2], 10) : startLine;
                    blocks.push({ type: 'replace', startLine, endLine, content: replaceMatch[3].trim() });
                    continue;
                }
                const insertMatch = trimmed.match(/^INSERT\s+after\s+(\d+)\s*:\s*\n?([\s\S]*?)\n?END\s*$/);
                if (insertMatch) {
                    const afterLine = parseInt(insertMatch[1], 10);
                    blocks.push({ type: 'insert', afterLine, content: insertMatch[2].trim() });
                    continue;
                }
                const deleteMatch = trimmed.match(/^DELETE\s+(\d+)(?:-(\d+))?/);
                if (deleteMatch) {
                    const startLine = parseInt(deleteMatch[1], 10);
                    const endLine = deleteMatch[2] ? parseInt(deleteMatch[2], 10) : startLine;
                    blocks.push({ type: 'delete', startLine, endLine });
                }
            }
        }
        return blocks;
    }

    function applyEditBlocks(blocks) {
        if (blocks.length === 0) return { success: false, reason: 'no_blocks' };
        const changedLines = new Set();
        const sorted = [...blocks].sort((a, b) => {
            const lineA = a.type === 'insert' ? a.afterLine : a.startLine;
            const lineB = b.type === 'insert' ? b.afterLine : b.startLine;
            return lineB - lineA;
        });
        for (const block of sorted) {
            if (block.type === 'replace') {
                const fromLine = block.startLine - 1;
                const toLine = block.endLine - 1;
                const from = { line: fromLine, ch: 0 };
                const to = { line: toLine + 1, ch: 0 };
                editor.replaceRange(block.content, from, to);
                const newLineCount = block.content.split('\n').length;
                for (let i = fromLine; i < fromLine + newLineCount; i++) changedLines.add(i);
            } else if (block.type === 'insert') {
                const afterLine = block.afterLine - 1;
                const lineText = editor.getLine(afterLine);
                const pos = { line: afterLine, ch: lineText ? lineText.length : 0 };
                editor.replaceRange('\n' + block.content, pos);
                const newLineCount = block.content.split('\n').length;
                for (let i = afterLine + 1; i <= afterLine + newLineCount; i++) changedLines.add(i);
            } else if (block.type === 'delete') {
                const fromLine = block.startLine - 1;
                const toLine = block.endLine - 1;
                const from = { line: fromLine, ch: 0 };
                const to = { line: toLine + 1, ch: 0 };
                editor.replaceRange('', from, to);
                for (let i = fromLine; i <= toLine; i++) changedLines.add(i);
            }
        }
        return { success: true, changedLines: Array.from(changedLines).sort((a, b) => a - b) };
    }

    function highlightChangedLines(lines) {

    function computeDiffLines(orig, mod) {
        const o = orig.split('\n');
        const n = mod.split('\n');
        const changed = new Set();
        const maxLen = Math.max(o.length, n.length);
        for (let i = 0; i < maxLen; i++) {
            if (o[i] !== n[i]) changed.add(i);
        }
        return Array.from(changed);
    }

    // ==================== Code Safety Check ====================
    function checkCodeSafety(originalCode, modifiedCode, mode) {
        const origLen = originalCode.length;
        const modLen = modifiedCode.length;
        const origLines = originalCode.split('\n').length;
        const modLines = modifiedCode.split('\n').length;
        const ratio = modLen / Math.max(origLen, 1);

        // Rule 1: If code is drastically shortened, it's suspicious
        if (mode === 'full' && ratio < 0.4) {
            return {
                safe: false,
                reason: 'code_too_short',
                message: 'AI 返回的代码（' + modLines + ' 行）明显短于原始代码（' + origLines + ' 行），可能存在删减。请检查后再应用。',
                severity: 'warning'
            };
        }

        // Rule 2: For HTML, check if major structural tags are preserved
        if (currentLang === 'html') {
            const origTags = new Set();
            const modTags = new Set();
            const tagMatches = originalCode.match(/<([a-zA-Z][a-zA-Z0-9]*)[\s>]/g);
            if (tagMatches) tagMatches.forEach(t => origTags.add(t.slice(1).trim()));
            const modTagMatches = modifiedCode.match(/<([a-zA-Z][a-zA-Z0-9]*)[\s>]/g);
            if (modTagMatches) modTagMatches.forEach(t => modTags.add(t.slice(1).trim()));
            // Check if more than 50% of original tags are missing
            let missingTags = 0;
            origTags.forEach(t => { if (!modTags.has(t)) missingTags++; });
            if (origTags.size > 5 && missingTags / origTags.size > 0.5) {
                return {
                    safe: false,
                    reason: 'tags_missing',
                    message: 'AI 返回的代码丢失了大量原始标签（' + missingTags + ' 个），请检查是否意外删减。',
                    severity: 'warning'
                };
            }
        }

        // Rule 3: For JS, check if major function definitions are preserved
        if (currentLang === 'javascript') {
            const origFns = new Set();
            const modFns = new Set();
            const fnMatches = originalCode.match(/function\s+(\w+)/g);
            if (fnMatches) fnMatches.forEach(f => origFns.add(f.replace('function ', '')));
            const modFnMatches = modifiedCode.match(/function\s+(\w+)/g);
            if (modFnMatches) modFnMatches.forEach(f => modFns.add(f.replace('function ', '')));
            let missingFns = 0;
            origFns.forEach(f => { if (!modFns.has(f)) missingFns++; });
            if (origFns.size > 3 && missingFns / origFns.size > 0.5) {
                return {
                    safe: false,
                    reason: 'functions_missing',
                    message: 'AI 返回的代码丢失了大量原始函数（' + missingFns + ' 个），请检查是否意外删减。',
                    severity: 'warning'
                };
            }
        }

        return { safe: true };
    }

    function renderThinkingSteps(thinkingText) {
        if (!thinkingText) return '<div class="thinking-step"><div class="thinking-step-content">AI 未输出结构化思考过程</div></div>';
        // Parse Chinese bracketed steps like 【问题理解】
        const stepRe = /【([^】]+)】/g;
        const steps = [];
        let m;
        while ((m = stepRe.exec(thinkingText)) !== null) { steps.push(m.index); }
        if (steps.length === 0) {
            // Fallback: split by blank lines
            return thinkingText.split(/\n\s*\n/).filter(s => s.trim()).map(para =>
                '<div class="thinking-step"><div class="thinking-step-content">' + escapeHtml(para.trim()) + '</div></div>'
            ).join('');
        }
        let html = '';
        for (let i = 0; i < steps.length; i++) {
            const start = steps[i];
            const end = steps[i + 1] !== undefined ? steps[i + 1] : thinkingText.length;
            const chunk = thinkingText.slice(start, end).trim();
            const titleMatch = chunk.match(/【([^】]+)】/);
            const title = titleMatch ? titleMatch[1] : '思考';
            const content = chunk.replace(/【[^】]+】/, '').trim();
            html += '<div class="thinking-step"><div class="thinking-step-title">' + escapeHtml(title) + '</div><div class="thinking-step-content">' + escapeHtml(content).replace(/\n/g, '<br>') + '</div></div>';
        }
        return html;
    }

    function addThinkingCard(msgEl, thinkingText, durationMs) {
        if (!thinkingText) return null;
        const card = document.createElement('div');

    async function fetchModels() {
        const endpoint = aiEndpointInput.value.trim(); const apiKey = loadAiKey();
        if (!apiKey) { showToast('请先输入 API Key', ''); return; }
        const modelsUrl = getEndpointModelsUrl(endpoint);
        btnRefreshModels.classList.add('spinning'); btnRefreshModels.disabled = true;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        try {
            const res = await fetch(modelsUrl, { headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' }, signal: controller.signal });
            clearTimeout(timeoutId);
            if (!res.ok) { let em = '获取失败'; if (res.status === 401) em = 'API Key 无效'; else if (res.status === 404) em = '不支持 /models'; throw new Error(em); }
            const data = await res.json(); const models = data.data || [];
            if (models.length === 0) { showToast('未获取到模型', ''); return; }
            populateModelSelect(models, loadAiModel());
            saveModelsCache(endpoint, models);
            analyzeModelCapabilities(models); // Agent: detect image/vision models
            showToast('已加载 ' + models.length + ' 个模型' +
                (agentModelCache?.imageModels?.length ? '（含图片生成）' : ''), '');
        } catch (err) {
            if (err.name === 'AbortError') { showToast('请求超时，请检查网络', ''); }

        finally { clearTimeout(timeoutId); btnRefreshModels.classList.remove('spinning'); btnRefreshModels.disabled = false; }

    btnAiSend.addEventListener('click', async () => {
        // If AI is currently generating, click = stop
        if (isAiGenerating) {

        const instruction = aiChatInput.value.trim();
        if (!instruction) return;
        const apiKey = loadAiKey();

        // Agent Mode
        if (agentModeToggle && agentModeToggle.checked) {

            catch (e) { if (e.name !== 'AbortError') addChatMessage('assistant', 'Agent 执行中断: ' + e.message, ICONS.error); }

        const deepThinking = deepThinkingToggle && deepThinkingToggle.checked;
        if (deepThinking && thinkingBadge) {

        aiStatusDot.classList.add('loading'); addTypingIndicator();
        highlightSelectionForAi(); // Highlight selected code so user sees what AI is focusing on
        const startTime = Date.now();

        // Streaming state
        let thinkingBuffer = '';
        let codeBuffer = '';
        let inThinking = false;
        let thinkingClosed = false;
        let thinkingCardEl = null;
        let thinkingBodyEl = null;
        let assistantMsgEl = null;
        let streamEnded = false;
        let streamError = null;
        let retryMsgEl = null;

        function flushThinkingDisplay() {
            if (!thinkingBodyEl) return;
            let displayText = thinkingBuffer;
            const openIdx = displayText.indexOf('<thinking>');
            if (openIdx !== -1) displayText = displayText.slice(openIdx + 10);
            const closeIdx = displayText.indexOf('</thinking>');
            if (closeIdx !== -1) displayText = displayText.slice(0, closeIdx);
            thinkingBodyEl.innerHTML = renderThinkingSteps(displayText.trim());
            aiChatArea.scrollTop = aiChatArea.scrollHeight;
        }

        // Stream-render: append raw text during streaming, parse markdown at paragraph end
        let streamTextBuf = '';
        let lastRenderTime = 0;
        const RENDER_THROTTLE = 80; // ms

        function flushStreamText() {
            if (!assistantMsgEl || streamTextBuf.length === 0) return;
            const now = Date.now();
            if (now - lastRenderTime < RENDER_THROTTLE) return;
            lastRenderTime = now;
            const textSpan = assistantMsgEl.querySelector('.msg-text');
            if (textSpan) {
                // During streaming: show plain text (no markdown parsing to avoid flicker)
                textSpan.textContent = streamTextBuf;
            }
            aiChatArea.scrollTop = aiChatArea.scrollHeight;
        }

        function onStreamChunk(chunk, fullText) {
            removeTypingIndicator();
            if (!assistantMsgEl) {
                assistantMsgEl = addChatMessage('assistant', '');
            }
            // State machine for <thinking> ... </thinking>
            for (let i = 0; i < chunk.length; i++) {
                const ch = chunk[i];
                if (!thinkingClosed) {
                    thinkingBuffer += ch;
                    if (!thinkingCardEl && thinkingBuffer.includes('<thinking>')) {
                        const cardInfo = createStreamingThinkingCard(assistantMsgEl);
                        thinkingCardEl = cardInfo.card;
                        thinkingBodyEl = cardInfo.body;
                        inThinking = true;
                    }
                    if (thinkingBuffer.includes('</thinking>')) {
                        thinkingClosed = true;
                        inThinking = false;
                        flushThinkingDisplay();
                        const labelEl = thinkingCardEl.querySelector('.thinking-header span');
                        if (labelEl) labelEl.textContent = '思考过程';
                    }
                    if (inThinking && !thinkingClosed && thinkingBodyEl) {
                        if (thinkingBuffer.length % 30 === 0) flushThinkingDisplay();
                    }
                } else {
                    codeBuffer += ch;
                    streamTextBuf += ch;
                }
            }
            // Throttled plain-text display during streaming
            if (thinkingClosed && codeBuffer.length > 0 && assistantMsgEl) {
                flushStreamText();
            }
        }

        async function handleParsedResponse(parsed, targetMsgEl, cFence) {
            const hasThinking = !!parsed.thinking;
            if (parsed.answer.includes('NOT_CODE_TASK')) {
                if (targetMsgEl) setAssistantMsgText(targetMsgEl, '请描述代码修改需求。');
                return;
            }
            const editBlocks = parseEditBlocks(parsed.answer);
            if (editBlocks.length > 0) {
                const beforeCode = getCode();
                const result = applyEditBlocks(editBlocks);
                if (result.success) {
                    const afterCode = getCode();
                    const safety = checkCodeSafety(beforeCode, afterCode, 'searchreplace');
                    if (!safety.safe) {
                        setCode(beforeCode);
                        if (targetMsgEl) setAssistantMsgText(targetMsgEl, safety.message);
                        addDiffCard(targetMsgEl, afterCode, false);
                        showToast('修改已撤销：' + safety.message, 'warning');
                    } else {
                        updatePreview();
                        highlightChangedLines(result.changedLines);
                        const opNames = editBlocks.map(b => b.type === 'replace' ? '替换' + b.startLine + '-' + b.endLine + '行' : b.type === 'insert' ? '插入到' + b.afterLine + '行后' : '删除' + b.startLine + '-' + b.endLine + '行').join('、');
                        if (targetMsgEl) setAssistantMsgText(targetMsgEl, '已自动应用 ' + editBlocks.length + ' 处修改（' + opNames + '）');
                        addDiffCard(targetMsgEl, afterCode, true);
                        showToast('代码已自动更新', 'success');
                    }
                } else {
                    if (targetMsgEl) setAssistantMsgText(targetMsgEl, '行号编辑应用失败，请手动应用。');
                    addDiffCard(targetMsgEl, parsed.answer, false);
                }
                return;
            }
            const srBlocks = parseSearchReplaceBlocks(parsed.answer);
            if (srBlocks.length > 0) {
                const beforeCode = getCode();
                const result = applySearchReplaceBlocks(srBlocks);
                if (result.success) {
                    const afterCode = getCode();
                    const safety = checkCodeSafety(beforeCode, afterCode, 'searchreplace');
                    if (!safety.safe) {
                        setCode(beforeCode);
                        if (targetMsgEl) setAssistantMsgText(targetMsgEl, safety.message);
                        addDiffCard(targetMsgEl, afterCode, false);
                        showToast('修改已撤销：' + safety.message, 'warning');
                    } else {
                        updatePreview();
                        highlightChangedLines(result.changedLines);
                        if (targetMsgEl) setAssistantMsgText(targetMsgEl, '已自动应用 ' + srBlocks.length + ' 处修改（第 ' + (result.changedLines[0] + 1) + ' 行起）');
                        addDiffCard(targetMsgEl, afterCode, true);
                        showToast('代码已自动更新', 'success');
                    }
                } else {
                    if (targetMsgEl) setAssistantMsgText(targetMsgEl, '自动应用失败：' + (result.reason === 'search_not_found' ? '找不到匹配文本' : result.reason === 'ambiguous_search' ? '匹配文本不唯一' : '未知错误') + '，请手动应用。');
                    addDiffCard(targetMsgEl, parsed.answer, false);
                }
                return;
            }
            const blockRe = new RegExp('```(?:' + cFence + '|html)?\\s*\\n?([\\s\\S]*?)```');
            const codeMatch = parsed.answer.match(blockRe);
            const extractedCode = codeMatch ? codeMatch[1].trim() : parsed.answer.trim();
            if (extractedCode) {
                const beforeCode = getCode();
                const safety = checkCodeSafety(beforeCode, extractedCode, 'full');
                if (!safety.safe) {
                    if (targetMsgEl) setAssistantMsgText(targetMsgEl, safety.message);
                    addDiffCard(targetMsgEl, extractedCode, false);
                    showToast(safety.message, 'warning');
                } else {
                    setCode(extractedCode);
                    updatePreview();
                    const diffLines = computeDiffLines(beforeCode, extractedCode);
                    highlightChangedLines(diffLines);
                    const diffSummary = buildDiffSummary(beforeCode, extractedCode);
                    if (targetMsgEl) setAssistantMsgText(targetMsgEl, diffSummary || '代码已修改');
                    addDiffCard(targetMsgEl, extractedCode, true);
                    showToast('代码已自动更新', 'success');
                }
            } else if (!hasThinking) {
                if (targetMsgEl) setAssistantMsgText(targetMsgEl, parsed.answer.trim() || '完成');
            }
        }

        try {
            const { fullText, codeFence, currentCode, aborted } = await callAiApiStream(apiKey, aiModelSelect.value, instruction, deepThinking, onStreamChunk);
            streamEnded = true;

            // If user aborted, preserve what we got and don't parse as error
            if (aborted) {
                removeTypingIndicator();
                if (assistantMsgEl) {
                    const preserved = streamTextBuf.trim();
                    if (preserved) {
                        setAssistantMsgText(assistantMsgEl, preserved);
                        // Try to parse any partial edit blocks
                        const partialParsed = parseThinkingResponse(thinkingBuffer + '\n' + streamTextBuf);
                        if (partialParsed.answer) handleParsedResponse(partialParsed, assistantMsgEl, codeFence);
                    } else {
                        setAssistantMsgText(assistantMsgEl, '已停止生成');
                    }
                }
                return;
            }

            const duration = Date.now() - startTime;
            removeTypingIndicator();

            // Parse final response
            const parsed = parseThinkingResponse(fullText);
            const hasThinking = !!parsed.thinking;

            // Create/update thinking card
            if (hasThinking && assistantMsgEl) {
                if (!thinkingCardEl) {
                    addThinkingCard(assistantMsgEl, parsed.thinking, duration);
                } else {
                    // Update existing card with final content
                    flushThinkingDisplay();
                }
            }

            // Update assistant message text
            if (assistantMsgEl) {
                setAssistantMsgText(assistantMsgEl, parsed.thinking ? '代码已生成' : (parsed.answer.trim() || '完成'));
            }

            // Final markdown render for non-code text responses
            if (assistantMsgEl && parsed.answer && !parsed.answer.includes('NOT_CODE_TASK') && !parsed.answer.match(/(REPLACE|INSERT|DELETE|```)/)) {
                const textSpan = assistantMsgEl.querySelector('.msg-text');
                if (textSpan && typeof marked !== 'undefined') {
                    try { textSpan.innerHTML = marked.parse(parsed.answer); } catch (e) { textSpan.textContent = parsed.answer; }
                }
            }

            await handleParsedResponse(parsed, assistantMsgEl, codeFence);
        } catch (err) {
            // Ignore AbortError (user clicked stop)
            if (err.name === 'AbortError') return;
            streamError = err;
            removeTypingIndicator();
            if (assistantMsgEl) {
                // Show error with retry options, preserving any generated content
                const preserved = streamTextBuf.trim();
                const errorHtml = '<span style="color:var(--semantic-error);">Error: ' + escapeHtml(err.message || '请求失败') + '</span>' +
                    (preserved ? '<div style="margin-top:8px;font-size:12px;color:var(--text-secondary);">已生成 ' + preserved.length + ' 字内容</div>' : '');
                const textSpan = assistantMsgEl.querySelector('.msg-text');
                if (textSpan) textSpan.innerHTML = errorHtml;

                // Add retry buttons
                const retryBar = document.createElement('div');
                retryBar.className = 'ai-retry-bar';
                retryBar.innerHTML = '<button class="btn btn-accent btn-retry" data-action="retry">重新生成</button>' +
                    (preserved ? '<button class="btn btn-retry-continue" data-action="continue">从断点继续</button>' : '');
                assistantMsgEl.appendChild(retryBar);

                retryBar.querySelectorAll('[data-action]').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const action = e.target.dataset.action;
                        retryBar.remove();
                        if (action === 'retry') {
                            // Clear and retry from beginning
                            if (assistantMsgEl) assistantMsgEl.remove();
                            btnAiSend.click();
                        } else if (action === 'continue') {
                            // Continue from where we left off
                            setAiGenerating(true);
                            aiStatusDot.classList.add('loading'); addTypingIndicator();
                            const continueMsg = '[继续生成] 请继续输出剩余内容。已生成内容：\n' + preserved.slice(-500);
                            try {
                                const { fullText: contText } = await callAiApiStream(apiKey, aiModelSelect.value, continueMsg, deepThinking, onStreamChunk);
                                // Append new content
                                streamTextBuf += contText;
                                // Re-process full result
                                const fullParsed = parseThinkingResponse(thinkingBuffer + '\n' + streamTextBuf);
                                handleParsedResponse(fullParsed, assistantMsgEl, codeFence);
                            } catch (e2) {
                                if (e2.name !== 'AbortError' && assistantMsgEl) setAssistantMsgText(assistantMsgEl, '继续生成也失败了: ' + e2.message);
                            } finally {
                                setAiGenerating(false);
                            }
                        }
                    });
                });
            } else {
                addChatMessage('assistant', 'Error: ' + (err.message || '请求失败'), ICONS.error);
            }
        } finally {
            setAiGenerating(false);
            if (thinkingBadge) thinkingBadge.style.display = 'none';
            clearAiSelectionHighlight();
        }
    });

    aiChatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey && !btnAiSend.disabled) { e.preventDefault(); btnAiSend.click(); } });

    function buildAiPayload(instruction, deepThinking) {

        const bestDesignKeys = autoSelectDesignSystems(instruction);
        const designSystemPrompt = getDesignSystemPrompt(bestDesignKeys);
        const editorCtx = getEditorContext();
        const outputFormatRule =
            '【输出格式——强制要求，违反将导致用户无法正常使用】\n' +

        const techSpec =
            '【代码技术规范——必须严格遵守】\n' +
            '▼CSS 动画：transition 必须写明属性名和时长，禁止 transition: all（性能差）；animation 必须定义 @keyframes；需 GPU 加速的动画加 will-change 或 transform: translateZ(0)；父元素 display:none 时 transition/animation 无效\n' +
            '▼CSS 属性：flex 布局 gap 属性旧版 Safari 不支持，用 margin 替代；backdrop-filter 需加 -webkit-backdrop-filter 前缀；position:fixed 在 transform 容器内失效\n' +
            '▼HTML 可访问性：img 必须有 alt 属性（纯装饰图用 alt=""）；button 必须有 type 属性；form input 必须有 label 关联；用语义标签（header/nav/main/section/footer）替代 div 堆砌\n' +
            '▼JS DOM：批量操作用 DocumentFragment 或 innerHTML 一次性更新，避免逐条 appendChild 触发多次回流；事件监听用事件委托绑定到父元素而非每个子元素；DOM 查询结果缓存到变量，禁止循环内反复 querySelector\n' +
            '▼JS 健壮性：所有 fetch 必须处理 .catch() 或 try/catch；禁止使用 eval()；动态 HTML 拼接用 textContent 防 XSS；定时器 clearTimeout/clearInterval 前先判空\n' +
            '▼浏览器兼容：CSS 属性需考虑 Chrome/Safari/Firefox 三大内核；新 CSS 属性检查兼容性，必要时加回退方案；font-size 最小 12px 以保证可读性；rem 单位确保 html 根字号已设置\n' +

    // ==================== Non-streaming fallback (for models that don't support stream) ====================
    async function callAiApi(apiKey, model, instruction, deepThinking) {
        const { messages, codeFence, currentCode } = buildAiPayload(instruction, deepThinking);
        const chatUrl = getEndpointChatUrl(loadAiEndpoint());
        const payload = { model: model, messages: messages };
        const res = await fetch(chatUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey }, body: JSON.stringify(payload) });
        if (!res.ok) {
            let em = 'API 错误 ' + res.status;
            if (res.status === 401) em = 'API Key 无效';
            else if (res.status === 429) em = '请求过于频繁';
            else if (res.status === 400) {
                try { const errData = await res.clone().json(); em = '请求参数错误：' + (errData.error?.message || errData.message || JSON.stringify(errData)); }
                catch (e) { const text = await res.clone().text(); em = '请求参数错误：' + text.slice(0, 200); }
            }
            throw new Error(em);
        }
        const data = await res.json();
        const aiText = data.choices?.[0]?.message?.content || '';
        if (!aiText.trim()) return { text: 'AI 返回了空响应，请重试。', code: null, thinking: null, mode: null };
        if (aiText.includes('NOT_CODE_TASK')) return { text: '请描述代码修改需求。', code: null, thinking: null, mode: null };
        const parsed = parseThinkingResponse(aiText);
        const editBlocks = parseEditBlocks(parsed.answer);
        if (editBlocks.length > 0) return { text: 'AI 建议了 ' + editBlocks.length + ' 处行号编辑', code: parsed.answer, thinking: parsed.thinking, mode: 'lineedit', editBlocks };
        const srBlocks = parseSearchReplaceBlocks(parsed.answer);
        if (srBlocks.length > 0) return { text: 'AI 建议了 ' + srBlocks.length + ' 处修改', code: parsed.answer, thinking: parsed.thinking, mode: 'searchreplace', srBlocks };
        const blockRe = new RegExp('```(?:' + codeFence + '|html)?\\s*\\n?([\\s\\S]*?)```');
        const codeMatch = parsed.answer.match(blockRe);
        const extractedCode = codeMatch ? codeMatch[1].trim() : parsed.answer.trim();
        if (!extractedCode) return { text: '未能从 AI 响应中提取到代码，请重试。', code: null, thinking: parsed.thinking, mode: null };
        const diffSummary = buildDiffSummary(currentCode, extractedCode);
        return { text: diffSummary || '代码已修改', code: extractedCode, thinking: parsed.thinking, mode: 'full' };
    }

    // ==================== Streaming API ====================
    async function callAiApiStream(apiKey, model, instruction, deepThinking, onChunk) {
        const { messages, codeFence, currentCode } = buildAiPayload(instruction, deepThinking);
        const chatUrl = getEndpointChatUrl(loadAiEndpoint());
        const payload = { model: model, messages: messages, stream: true };
        const controller = new AbortController();
        activeAbortController = controller;
        const timeoutId = setTimeout(() => controller.abort(), 300000); // 5 min for long generations
        const res = await fetch(chatUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey }, body: JSON.stringify(payload), signal: controller.signal });
        clearTimeout(timeoutId);
        if (!res.ok) {
            let em = 'API 错误 ' + res.status;
            if (res.status === 401) em = 'API Key 无效';
            else if (res.status === 429) em = '请求过于频繁';
            else if (res.status === 400) {
                try { const errData = await res.clone().json(); em = '请求参数错误：' + (errData.error?.message || errData.message || JSON.stringify(errData)); }
                catch (e) { const text = await res.clone().text(); em = '请求参数错误：' + text.slice(0, 200); }
            }
            throw new Error(em);
        }

        // Fallback: if API returned JSON instead of SSE (model doesn't support streaming)
        const ct = res.headers.get('Content-Type') || '';
        if (!ct.includes('text/event-stream')) {
            const data = await res.json();
            const aiText = data.choices?.[0]?.message?.content || '';
            if (aiText && onChunk) onChunk(aiText, aiText);
            return { fullText: aiText, codeFence, currentCode };
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';
        try {
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // keep incomplete line
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed.startsWith('data:')) continue;
                    const dataStr = trimmed.slice(5).trim();
                    if (dataStr === '[DONE]') continue;
                    try {
                        const chunk = JSON.parse(dataStr);
                        const content = chunk.choices?.[0]?.delta?.content || '';
                        if (content) {
                            fullText += content;
                            if (onChunk) onChunk(content, fullText);
                        }
                    } catch (e) { /* ignore malformed lines */ }
                }
            }
            // Process remaining buffer
            if (buffer.trim().startsWith('data:')) {
                const dataStr = buffer.trim().slice(5).trim();
                if (dataStr !== '[DONE]') {
                    try {
                        const chunk = JSON.parse(dataStr);
                        const content = chunk.choices?.[0]?.delta?.content || '';
                        if (content) { fullText += content; if (onChunk) onChunk(content, fullText); }
                    } catch (e) { /* ignore */ }
                }
            }
        } catch (e) {
            if (e.name === 'AbortError') {
                // User cancelled — return what we have so far
                return { fullText, codeFence, currentCode, aborted: true };
            }
            throw e;
        } finally {
            reader.releaseLock();
            activeAbortController = null;
        }
        return { fullText, codeFence, currentCode };
    }

    function buildDiffSummary(orig, mod) {
        const ol = orig.split('\n'); const nl = mod.split('\n');
        const added = nl.length - ol.length;
        const changed = nl.filter((l, i) => l !== ol[i] && i < ol.length).length;
        const parts = [];
        if (added > 0) parts.push('新增 ' + added + ' 行');
        else if (added < 0) parts.push('删除 ' + Math.abs(added) + ' 行');
        if (changed > 0 && changed !== Math.abs(added)) parts.push('修改 ' + changed + ' 行');
        return parts.length ? parts.join('，') : '代码已修改';
    }

    function addDiffCard(msgEl, code, autoApplied) {
        const card = document.createElement('div'); card.className = 'ai-diff-card';
        const title = autoApplied ? '当前代码' : '修改后的代码';
        const applyBtn = autoApplied
            ? '<span class="ai-applied-label" style="font-size:var(--font-size-caption);color:var(--semantic-success);">已自动应用</span>'
            : '<button class="btn btn-accent btn-apply-ai-code">应用到编辑器</button>';
        card.innerHTML = '<div class="ai-diff-header"><span>' + title + '</span><span>' + code.split('\n').length + ' 行</span></div><div class="ai-diff-code">' + escapeHtml(code.slice(0, 1500)) + (code.length > 1500 ? '\n…（已截断）' : '') + '</div><div class="ai-diff-actions">' + applyBtn + '<button class="btn btn-copy-ai-code">复制</button></div>';
        const applyEl = card.querySelector('.btn-apply-ai-code');
        if (applyEl && !autoApplied) {
            applyEl.addEventListener('click', () => {
                // 1. Try line-based edit blocks first
                const editBlocks = parseEditBlocks(code);
                if (editBlocks.length > 0) {
                    const beforeCode = getCode();
                    const result = applyEditBlocks(editBlocks);
                    if (result.success) {
                        updatePreview();
                        highlightChangedLines(result.changedLines);
                        const opNames = editBlocks.map(b => b.type === 'replace' ? '替换' + b.startLine + '-' + b.endLine + '行' : b.type === 'insert' ? '插入到' + b.afterLine + '行后' : '删除' + b.startLine + '-' + b.endLine + '行').join('、');
                        showToast('已应用 ' + editBlocks.length + ' 处修改（' + opNames + '）', 'success');
                        applyEl.outerHTML = '<span class="ai-applied-label" style="font-size:var(--font-size-caption);color:var(--semantic-success);">已自动应用</span>';
                        return;
                    }
                    showToast('行号编辑应用失败，请检查行号是否正确', 'warning');
                    return;
                }
                // 2. Fallback to Search/Replace blocks
                const srBlocks = parseSearchReplaceBlocks(code);
                if (srBlocks.length > 0) {
                    const beforeCode = getCode();
                    const result = applySearchReplaceBlocks(srBlocks);
                    if (result.success) {
                        updatePreview();
                        highlightChangedLines(result.changedLines);
                        showToast('已应用 ' + srBlocks.length + ' 处修改', 'success');
                        applyEl.outerHTML = '<span class="ai-applied-label" style="font-size:var(--font-size-caption);color:var(--semantic-success);">已自动应用</span>';
                        return;
                    }
                    const fallbackCode = srBlocks.map(b => b.replace).join('\n\n');
                    if (fallbackCode && confirm('Search/Replace 自动匹配失败（可能是缩进不一致）。是否直接插入 REPLACE 部分？')) {
                        setCode(fallbackCode);
                        updatePreview();
                        showToast('已插入 REPLACE 内容', '');
                        applyEl.outerHTML = '<span class="ai-applied-label" style="font-size:var(--font-size-caption);color:var(--semantic-success);">已应用</span>';
                        return;
                    }
                    showToast('Search/Replace 匹配失败，请检查代码缩进是否与编辑器一致', 'warning');
                    return;
                }
                // 3. Fallback: direct apply
                setCode(code);
                updatePreview();
                showToast('已应用', '');
            });
        }
        card.querySelector('.btn-copy-ai-code').addEventListener('click', () => { navigator.clipboard.writeText(code).then(() => showToast('已复制', '')).catch(() => showToast('复制失败', '')); });
        msgEl.appendChild(card); aiChatArea.scrollTop = aiChatArea.scrollHeight;
    }

    function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Auto-analyze models to detect capabilities
    function analyzeModelCapabilities(models) {
        const chatModels = []; const imageModels = []; const visionModels = [];
        const imageKeywords = ['dall-e', 'dalle', 'image', 'flux', 'stable.diffusion', 'midjourney', 'sd-', 'imagen'];
        const visionKeywords = ['vision', 'vl', 'multimodal', 'gpt-4o', 'claude-3', 'gemini-pro-vision'];
        for (const m of models) {
            const id = (m.id || '').toLowerCase();
            const isImage = imageKeywords.some(k => id.includes(k));
            const isVision = visionKeywords.some(k => id.includes(k));
            if (isImage) { imageModels.push(m); }
            else if (isVision) { visionModels.push(m); }
            else { chatModels.push(m); }
        }
        // Sort: prefer higher version numbers, then by name
        const sortByVersion = (a, b) => {
            const numsA = (a.id.match(/\d+/g) || []).map(Number);
            const numsB = (b.id.match(/\d+/g) || []).map(Number);
            for (let i = 0; i < Math.max(numsA.length, numsB.length); i++) {
                const na = numsA[i] || 0; const nb = numsB[i] || 0;
                if (na !== nb) return nb - na;
            }
            return (b.id || '').localeCompare(a.id || '');
        };
        chatModels.sort(sortByVersion); imageModels.sort(sortByVersion); visionModels.sort(sortByVersion);
        agentModelCache = { chatModels, imageModels, visionModels };
        return agentModelCache;
    }

                operation: { type: 'string', enum: ['replace', 'insert', 'delete'], description: '操作类型' },
                startLine: { type: 'number', description: '起始行号（1-based）' },
                endLine: { type: 'number', description: '结束行号（1-based，replace/delete 时使用）' },

        }},
        { type: 'function', function: {

        }},
        { type: 'function', function: {
            name: 'search_web', description: '搜索网页获取最新信息、文档、API 参考',

                query: { type: 'string', description: '搜索关键词' }
            }, required: ['query'] }
        }},
        { type: 'function', function: {

                prompt: { type: 'string', description: '图片描述（英文效果更好）' },

    async function executeAgentTool(toolName, args) {
        switch (toolName) {
            case 'analyze_code': {
                const code = getCode();
                const lines = code.split('\n');
                return '代码共 ' + lines.length + ' 行，语言: ' + (LANG_CONFIG[currentLang]?.label || 'HTML') + '\n前10行预览:\n' + lines.slice(0, 10).map((l, i) => '  ' + (i+1) + ' | ' + l).join('\n');
            }
            case 'edit_code': {
                const blocks = [];
                if (args.operation === 'replace') {
                    blocks.push({ type: 'replace', startLine: args.startLine, endLine: args.endLine || args.startLine, content: args.code });
                } else if (args.operation === 'insert') {
                    blocks.push({ type: 'insert', afterLine: args.afterLine, content: args.code });
                } else if (args.operation === 'delete') {
                    blocks.push({ type: 'delete', startLine: args.startLine, endLine: args.endLine || args.startLine });
                }
                const result = applyEditBlocks(blocks);
                if (result.success) {
                    updatePreview();
                    highlightChangedLines(result.changedLines);
                    return '[OK] 修改成功，共修改 ' + result.changedLines.length + ' 行';
                }
                return '[ERR] 修改失败: ' + (result.reason || '未知错误');
            }
            case 'preview_code': {
                updatePreview();
                return '[OK] 预览已刷新';
            }
            case 'search_web': {
                try {
                    // Try multiple search endpoints for robustness
                    const endpoints = [
                        'https://api.duckduckgo.com/?q=' + encodeURIComponent(args.query) + '&format=json&no_html=1',
                        'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(args.query)
                    ];
                    let lastErr = '';
                    for (const url of endpoints) {
                        const searchCtrl = new AbortController();
                        const searchTimeout = setTimeout(() => searchCtrl.abort(), 8000);
                        try {
                            const res = await fetch(url, { signal: searchCtrl.signal });
                            clearTimeout(searchTimeout);
                            if (res.ok) {
                                const text = await res.text();
                                // Try to extract some text from HTML or JSON
                                const snippets = text.match(/class="result__snippet"[^>]*>([^<]+)/g);
                                if (snippets && snippets.length > 0) {
                                    return snippets.slice(0, 3).map(s => s.replace(/<[^>]+>/g, '').trim()).join('\n');
                                }
                                return '搜索完成，未获取到详细结果。请基于已有知识回答。';
                            }
                        } catch(e) { clearTimeout(searchTimeout); lastErr = e.message; }
                    }
                    return '[WARN] 搜索暂时不可用。请基于已有知识回答。';
                } catch(e) { return '[WARN] 搜索暂时不可用。请基于已有知识回答。'; }
            }
            case 'generate_image': {
                const imgModel = getBestImageModel();
                if (!imgModel) return '[WARN] 当前 API 不支持图片生成模型';
                try {
                    const endpoint = loadAiEndpoint() || DEFAULT_ENDPOINT;
                    const base = endpoint.replace(/\/+$/, '');
                    // Try multiple possible image generation endpoints
                    const possibleUrls = [
                        base + '/images/generations',
                        base + '/v1/images/generations'
                    ];
                    let lastErr = '';
                    for (const imgUrl of possibleUrls) {
                        try {
                            const res = await fetch(imgUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + loadAiKey() },
                                body: JSON.stringify({ model: imgModel, prompt: args.prompt, n: 1, size: args.size || '1024x1024' })
                            });
                            if (res.ok) {
                                const data = await res.json();
                                const url = data.data?.[0]?.url || data.url || data.data?.[0]?.b64_json;
                                if (url) return '[OK] 图片已生成，URL: ' + url + '\n请在 img 标签中使用此 URL。';
                            }
                            lastErr = 'HTTP ' + res.status;
                        } catch(e) { lastErr = e.message; }
                    }
                    return '[ERR] 图片生成失败: ' + lastErr;
                } catch(e) { return '[ERR] 图片生成出错: ' + e.message; }
            }
            case 'add_dependency': {
                const code = getCode();
                const tag = args.type === 'script'
                    ? '<script src="' + args.url + '"><\/script>'
                    : '<link rel="stylesheet" href="' + args.url + '">';
                let newCode;
                if (code.includes('</head>')) {
                    newCode = code.replace('</head>', '  ' + tag + '\n</head>');
                } else if (code.includes('<head>')) {
                    newCode = code.replace('<head>', '<head>\n  ' + tag);
                } else {
                    newCode = '<head>\n  ' + tag + '\n</head>\n' + code;
                }
                setCode(newCode); updatePreview();
                return '[OK] 已添加' + (args.type === 'script' ? '脚本' : '样式') + ': ' + args.url;
            }
            case 'get_skill': {
                if (args.domain === 'gsap') {
                    return 'GSAP 3.x 全套可用插件: ScrollTrigger, MotionPath, Flip, Observer, Draggable, SplitText, MorphSVG, Inertia, Physics2D, PhysicsProps, ScrambleText。用法示例: gsap.to(".box", { x: 100, duration: 1, ease: "power2.out" })';
                }
                if (args.domain === 'design') {
                    const ds = autoSelectDesignSystems(args.query || '');
                    return '推荐设计系统: ' + ds.join(', ') + '\n规范: ' + getDesignSystemPrompt(ds).slice(0, 500);
                }
                if (args.domain === 'snippet') {
                    return '内置代码片段：按钮组件、卡片组件、导航栏、Hero区域、Footer、表单、模态框、加载动画、粒子背景、3D卡片翻转、视差滚动、打字机效果。可用 get_skill domain=snippet query=按钮 获取具体代码。';
                }
                if (args.domain === 'api') {
                    return '内置 API 数据源：JSONPlaceholder、TheCatAPI、TheDogAPI、PokéAPI、OpenWeatherMap、Unsplash、GitHub API、REST Countries 等。可用 get_skill domain=api 查询具体 API。';
                }
                return '未知技能领域: ' + args.domain;
            }
            case 'complete': return '[OK] 任务完成: ' + (args.summary || '无总结');
            default: return '未知工具: ' + toolName;
        }
    }

    async function runAgentLoop(userRequest) {
        const apiKey = loadAiKey(); if (!apiKey) { showToast('请先设置 API Key', ''); return; }
        const model = getBestChatModel();
        const endpoint = loadAiEndpoint() || DEFAULT_ENDPOINT;
        const chatUrl = endpoint.replace(/\/+$/, '') + '/chat/completions';

        // Refresh model analysis
        try {
            const modelsUrl = endpoint.replace(/\/+$/, '') + '/models';
            const res = await fetch(modelsUrl, { headers: { 'Authorization': 'Bearer ' + apiKey } });
            if (res.ok) { const data = await res.json(); analyzeModelCapabilities(data.data || []); }
        } catch(e) { /* use cached if fetch fails */ }

        const imgModel = getBestImageModel();
        const imgCapabilityNote = imgModel ? '\n【图片生成】可用模型：' + imgModel : '\n【图片生成】当前 API 不支持图片生成';

        // Build design systems summary for Agent knowledge
        const dsNames = Object.entries(DESIGN_SYSTEMS).map(([k, v]) => {
            if (k === 'default') return '- 通用现代（默认）: ' + v.desc;
            return '- ' + v.name + ': ' + v.desc;
        }).join('\n');

        const systemPrompt =
            '你是 Werkstatt AI Agent — 一个专业的全栈前端开发助手，运行在实时预览编辑器中。\n\n' +
            '【核心工作流 — ReAct 循环】\n' +
            '1. 思考（Think）：分析用户需求，判断需要的工具和设计方向\n' +
            '2. 行动（Act）：调用最必要的工具（每次最多 1-2 个）\n' +
            '3. 观察（Observe）：查看工具返回结果\n' +
            '4. 循环：如有需要继续执行，直到任务完成\n' +
            '5. 完成：调用 complete 工具总结所做修改\n\n' +
            '【代码修改规范 — 必须使用行号编辑】\n' +
            '- 编辑代码时通过 edit_code 工具操作，使用行号定位（1-based）\n' +
            '- replace: 替换从 startLine 到 endLine 的内容\n' +
            '- insert: 在 afterLine 后插入新代码\n' +
            '- delete: 删除从 startLine 到 endLine 的内容\n' +
            '- 修改前必须先 analyze_code 了解代码结构\n' +
            '- 每次修改范围尽量小且精确（3-15 行为佳）\n' +
            '- 修改后必须调用 preview_code 验证效果\n\n' +
            '【内置设计模板库 — 可根据需求自动选择】\n' +
            dsNames + '\n\n' +
            '【内置技术能力】\n' +
            '- GSAP 3.x 动画：ScrollTrigger、MotionPath、Flip、Observer、Draggable 等全套插件可用\n' +
            '- API 数据源：JSONPlaceholder、TheCatAPI、PokéAPI、OpenWeatherMap、Unsplash、GitHub API 等\n' +
            '- 代码片段：按钮、卡片、导航栏、Hero、Footer、表单、模态框、加载动画、粒子背景、3D翻转、视差滚动\n' +
            '- 如需添加外部库，使用 add_dependency 工具引入 CDN\n\n' +
            '【深度思考模式】\n' +
            '在 <thinking> 标签内进行多维度分析：\n' +
            '- 结构分析：页面 DOM 结构是否合理，语义化标签使用是否正确\n' +
            '- 视觉设计：色彩对比度、间距节奏、排版层次、品牌一致性\n' +
            '- 交互体验：动画流畅度、响应式适配、无障碍访问（ARIA标签、焦点管理）\n' +
            '- 代码质量：重复代码、性能优化机会、潜在 Bug、CSS 特异性问题\n' +
            '- 可维护性：命名规范、注释完整性、HTML 结构清晰度\n' +
            '分析完成后在 thinking 标签外给出具体修改方案。\n\n' +
            '【自检要求】\n' +
            '每次修改前自检：\n' +
            '- 是否只修改了必要的行？\n' +
            '- 是否有遗漏的闭合标签？\n' +
            '- CSS 选择器是否可能误伤其他元素？\n' +
            '- 修改后是否破坏原有功能？\n\n' +
            imgCapabilityNote + '\n' +
            '\n如果用户需求涉及最新信息，使用 search_web 工具搜索。' +
            '\n如果用户需要图片且图片生成可用，使用 generate_image 工具。' +
            '\n如果用户提到特定设计系统（如"做成 Apple 风格"），自动应用对应模板规范。';

        const messages = [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userRequest }
        ];

        hideAiEmptyState(); addChatMessage('user', userRequest);
        const statusMsg = addChatMessage('assistant', 'Agent 模式已启动，正在分析需求…', ICONS.agent);
        setAgentStatus('分析中', '正在理解需求');
        let totalTurns = 0;
        let toolsSupported = true; // Will be set to false if API rejects tools

        while (true) {
            // Check if user requested abort
            if (!isAiGenerating) {
                setAgentStatus('已停止', '用户中断');
                addChatMessage('assistant', 'Agent 执行已被用户中断', ICONS.warn);
                throw new Error('AbortError');
            }
            totalTurns++;
            // Safety: after 50 turns, ask if we should continue (not hard stop)
            if (totalTurns > 50) {
                setAgentStatus('提示', '已执行 50+ 步');
                addChatMessage('assistant', 'Agent 已执行超过 50 步，任务可能较复杂。如需继续，请重新描述需求。', ICONS.info);
                break;
            }
            try {
                let payload;
                if (toolsSupported) {
                    payload = { model, messages, tools: AGENT_TOOLS, tool_choice: 'auto' };
                } else {
                    // Fallback: no tools, just regular chat with enhanced system prompt
                    payload = { model, messages };
                }
                const controller = new AbortController();
                activeAbortController = controller;
                const res = await fetch(chatUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                if (!res.ok) {
                    const errText = await res.text();
                    // Detect API that doesn't support tools (400/404 with tool-related error, or any 400/404 on first turn)
                    const isToolError = errText.includes('tool') || errText.includes('function') || errText.includes('不支持') || errText.includes('not supported') || errText.includes('tool_choice') || errText.includes('invalid');
                    if (toolsSupported && (isToolError || res.status === 404 || (res.status === 400 && totalTurns <= 2))) {
                        toolsSupported = false;
                        totalTurns--; // retry this turn without tools
                        addChatMessage('assistant', '当前 API 不支持工具调用格式，已降级为智能对话模式', ICONS.info);
                        continue;
                    }
                    setAgentStatus('错误', 'API 返回 ' + res.status);
                    addChatMessage('assistant', 'Agent 执行出错: HTTP ' + res.status + (errText ? ' — ' + errText.slice(0, 120) : ''), ICONS.error);
                    return;
                }
                const data = await res.json();
                const choice = data.choices?.[0]; if (!choice) break;
                const msg = choice.message;
                messages.push(msg);

                // Fallback mode: no tool_calls from API, treat content as final answer
                if (!toolsSupported) {
                    setAgentStatus('完成', totalTurns + ' 步');
                    if (msg.content) {
                        addChatMessage('assistant', msg.content);
                        const parsed = parseThinkingResponse(msg.content);
                        const editBlocks = parseEditBlocks(parsed.answer);
                        if (editBlocks.length > 0) {
                            const result = applyEditBlocks(editBlocks);
                            if (result.success) {
                                updatePreview();
                                highlightChangedLines(result.changedLines);
                                addChatMessage('assistant', '已自动应用 ' + editBlocks.length + ' 处修改', ICONS.check);
                            }
                        }
                    }
                    return;
                }

                // Parse thinking content if present (even with tool_calls)
                if (msg.content) {
                    const parsed = parseThinkingResponse(msg.content);
                    if (parsed.thinking) {
                        // Show thinking card for Agent's reasoning
                        const thinkMsg = addChatMessage('assistant', '', ICONS.agent);
                        addThinkingCard(thinkMsg, parsed.thinking, 0);
                    }
                }

                if (!msg.tool_calls || msg.tool_calls.length === 0) {
                    // Agent finished - no more tool calls
                    setAgentStatus('完成', totalTurns + ' 步');
                    if (msg.content) {
                        const parsed = parseThinkingResponse(msg.content);
                        // Show answer content (not thinking)
                        if (parsed.answer && parsed.answer.trim()) {
                            addChatMessage('assistant', parsed.answer);
                        }
                        // Try to apply any edit blocks in the final answer
                        const editBlocks = parseEditBlocks(parsed.answer);
                        if (editBlocks.length > 0) {
                            const result = applyEditBlocks(editBlocks);
                            if (result.success) {
                                updatePreview();
                                highlightChangedLines(result.changedLines);
                                addChatMessage('assistant', '已自动应用 ' + editBlocks.length + ' 处修改', ICONS.check);
                            }
                        }
                    }
                    return;
                }

                // Execute tool calls
                for (const tc of msg.tool_calls) {
                    // Check abort before each tool
                    if (!isAiGenerating) {
                        setAgentStatus('已停止', '用户中断');
                        addChatMessage('assistant', 'Agent 执行已被用户中断', ICONS.warn);
                        throw new Error('AbortError');
                    }
                    let toolName, toolArgs;
                    try {
                        toolName = tc.function?.name || 'unknown';
                        toolArgs = JSON.parse(tc.function?.arguments || '{}');
                    } catch (parseErr) {
                        addChatMessage('assistant', '工具参数解析失败，跳过此步骤', ICONS.warn);
                        continue;
                    }
                    setAgentStatus('执行: ' + toolName, toolArgs.query || toolArgs.operation || '');
                    addChatMessage('assistant', '调用 ' + toolName + '…', ICONS.tool);

                    const result = await executeAgentTool(toolName, toolArgs);
                    messages.push({ role: 'tool', tool_call_id: tc.id, content: result });
                }
            } catch(e) {
                if (e.name === 'AbortError' || e.message === 'AbortError') {
                    setAgentStatus('已停止', '用户中断');
                    throw e; // Let outer handler deal with it
                }
                setAgentStatus('错误', e.message);
                addChatMessage('assistant', 'Agent 执行出错: ' + e.message, ICONS.error);
                return;
            }
        }
        setAgentStatus('完成', totalTurns + ' 步');
        addChatMessage('assistant', 'Agent 执行结束（共 ' + totalTurns + ' 步）', ICONS.check);
    }

    // Agent mode initialization
    if (agentModeToggle) {
        agentModeToggle.checked = loadAgentMode();
        agentModeToggle.addEventListener('change', () => {
            const v = agentModeToggle.checked;
            saveAgentMode(v);
            if (v) {
                document.querySelector('.ai-panel')?.classList.add('agent-mode-active');
                setAgentStatus('就绪', 'Agent 模式已激活');
                // Agent mode and deep thinking are mutually exclusive
                if (deepThinkingToggle && deepThinkingToggle.checked) {
                    deepThinkingToggle.checked = false;
                    saveDeepThinking(false);
                }
            } else {
                document.querySelector('.ai-panel')?.classList.remove('agent-mode-active');
                setAgentStatus('', '');
            }
        });
        if (loadAgentMode()) {
            document.querySelector('.ai-panel')?.classList.add('agent-mode-active');
        }
    }
    // Deep thinking toggle: disable agent mode when enabled
    if (deepThinkingToggle) {
        const origDtChange = deepThinkingToggle.onchange;
        deepThinkingToggle.addEventListener('change', () => {
            if (deepThinkingToggle.checked && agentModeToggle && agentModeToggle.checked) {
                agentModeToggle.checked = false;
                saveAgentMode(false);
                document.querySelector('.ai-panel')?.classList.remove('agent-mode-active');
                setAgentStatus('', '');
            }
        });
    }

    editor.on('change', () => {
        if (previewDebounceTimer) clearTimeout(previewDebounceTimer);
        previewDebounceTimer = setTimeout(() => { updatePreview(); }, PREVIEW_DEBOUNCE_DELAY);

        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveEditorCode(), SAVE_DELAY);
    });

    btnCopy.addEventListener('click', copyCode);
    btnFormat.addEventListener('click', formatCode);
    btnRefresh.addEventListener('click', () => { updatePreview(); showStatus('已刷新', 'ready'); });
    btnDownload.addEventListener('click', downloadHTML);

    // Fullscreen
    const btnFullscreen = document.getElementById('btnFullscreen');
    const fsIcon = btnFullscreen.querySelector('.btn-icon use');
    function isFs() { return document.fullscreenElement === previewPanel || document.webkitFullscreenElement === previewPanel; }
    function toggleFs() { if (isFs()) { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); } else { if (previewPanel.requestFullscreen) previewPanel.requestFullscreen(); else if (previewPanel.webkitRequestFullscreen) previewPanel.webkitRequestFullscreen(); } }
    function updateFsIcon() { if (isFs()) { fsIcon.setAttribute('href', '#icon-minimize'); btnFullscreen.setAttribute('title', '退出全屏'); } else { fsIcon.setAttribute('href', '#icon-maximize'); btnFullscreen.setAttribute('title', '全屏预览'); } }
    btnFullscreen.addEventListener('click', toggleFs);
    document.addEventListener('fullscreenchange', updateFsIcon);
    document.addEventListener('webkitfullscreenchange', updateFsIcon);

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); downloadHTML(); }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'f') { e.preventDefault(); formatCode(); }

    rebuildLangTabs();

    window.addEventListener('beforeunload', () => {
        if (_statesSaved) return;
        _statesSaved = true;
        saveEditorCode();
        savePanelStates({ side: !workspace.classList.contains('side-hidden'), editor: !workspace.classList.contains('editor-hidden'), preview: !workspace.classList.contains('preview-hidden') });
    });
    window.addEventListener('pagehide', () => {
        if (_statesSaved) return;
        _statesSaved = true;
        saveEditorCode();
        savePanelStates({ side: !workspace.classList.contains('side-hidden'), editor: !workspace.classList.contains('editor-hidden'), preview: !workspace.classList.contains('preview-hidden') });
    });

    console.log('Werkstatt v4 — 匠人工坊 · 实时预览编辑器已就绪');
})();
